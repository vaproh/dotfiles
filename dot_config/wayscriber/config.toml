[drawing]
default_color = "red"
default_thickness = 3.0
default_eraser_size = 12.0
default_eraser_mode = "brush"
marker_opacity = 0.32
default_fill_enabled = false
default_font_size = 32.0
hit_test_tolerance = 6.0
hit_test_linear_threshold = 400
undo_stack_limit = 100
drag_tool = "pen"
shift_drag_tool = "line"
ctrl_drag_tool = "rect"
ctrl_shift_drag_tool = "arrow"
tab_drag_tool = "ellipse"
font_family = "Sans"
font_weight = "bold"
font_style = "normal"
text_background_enabled = false

[drawing.drag_tools.left]
drag_tool = "pen"
shift_drag_tool = "line"
ctrl_drag_tool = "rect"
ctrl_shift_drag_tool = "arrow"
tab_drag_tool = "ellipse"

[drawing.drag_tools.right]
drag_tool = "default"
shift_drag_tool = "default"
ctrl_drag_tool = "default"
ctrl_shift_drag_tool = "default"
tab_drag_tool = "default"

[drawing.drag_tools.middle]
drag_tool = "default"
shift_drag_tool = "default"
ctrl_drag_tool = "default"
ctrl_shift_drag_tool = "default"
tab_drag_tool = "default"

[presets]
slot_count = 5

[history]
undo_all_delay_ms = 1000
redo_all_delay_ms = 1000
custom_section_enabled = false
custom_undo_delay_ms = 1000
custom_redo_delay_ms = 1000
custom_undo_steps = 5
custom_redo_steps = 5

[arrow]
length = 20.0
angle_degrees = 30.0
head_at_end = true

[performance]
buffer_count = 3
enable_vsync = true
max_fps_no_vsync = 60
ui_animation_fps = 30

[ui]
show_status_bar = true
show_status_board_badge = true
show_status_page_badge = true
show_floating_badge_always = false
show_frozen_badge = false
status_bar_position = "bottom-left"
help_overlay_context_filter = true
show_capabilities_warning = true
multi_monitor_enabled = true
active_output_badge = true
command_palette_toast_duration_ms = 1500
xdg_fullscreen = false
xdg_focus_loss_behavior = "exit"
radial_menu_mouse_binding = "middle"

[ui.status_bar_style]
font_size = 21.0
padding = 15.0
bg_color = [
    0.0,
    0.0,
    0.0,
    0.85,
]
text_color = [
    1.0,
    1.0,
    1.0,
    1.0,
]
dot_radius = 6.0

[ui.help_overlay_style]
font_size = 14.0
font_family = "Noto Sans, DejaVu Sans, Liberation Sans, Sans"
line_height = 22.0
padding = 32.0
bg_color = [
    0.09,
    0.1,
    0.13,
    0.92,
]
border_color = [
    0.33,
    0.39,
    0.52,
    0.88,
]
border_width = 2.0
text_color = [
    0.95,
    0.96,
    0.98,
    1.0,
]

[ui.click_highlight]
enabled = false
show_on_highlight_tool = false
radius = 24.0
outline_thickness = 4.0
duration_ms = 750
fill_color = [
    1.0,
    0.8,
    0.0,
    0.35,
]
outline_color = [
    1.0,
    0.6,
    0.0,
    0.9,
]
use_pen_color = true

[ui.context_menu]
enabled = true

[ui.toolbar]
layout_mode = "simple"
top_pinned = false
side_pinned = false
use_icons = true
scale = 1.0
show_more_colors = false
show_actions_section = true
show_actions_advanced = false
show_zoom_actions = true
show_pages_section = true
show_boards_section = true
show_presets = false
show_step_section = false
show_text_controls = true
show_settings_section = false
show_delay_sliders = false
show_marker_opacity_section = false
context_aware_ui = true
show_preset_toasts = true
show_tool_preview = false
top_offset = 0.0
top_offset_y = 0.0
side_offset = 0.0
side_offset_x = 0.0
force_inline = false

[ui.toolbar.mode_overrides.simple]

[ui.toolbar.mode_overrides.regular]

[ui.toolbar.mode_overrides.advanced]

[presenter_mode]
hide_status_bar = true
hide_toolbars = true
hide_tool_preview = true
close_help_overlay = true
enable_click_highlight = true
tool_behavior = "force-highlight"
show_toast = true

[boards]
max_count = 9
auto_create = true
show_board_badge = true
pan_enabled = true
show_pan_badge = true
persist_customizations = true
default_board = "transparent"

[[boards.items]]
id = "transparent"
name = "Overlay"
background = "transparent"
auto_adjust_pen = false
persist = true
pinned = false

[[boards.items]]
id = "whiteboard"
name = "Whiteboard"
background = [
    0.992,
    0.992,
    0.992,
]
default_pen_color = [
    0.0,
    0.0,
    0.0,
]
auto_adjust_pen = true
persist = true
pinned = false

[[boards.items]]
id = "blackboard"
name = "Blackboard"
background = [
    0.067,
    0.067,
    0.067,
]
default_pen_color = [
    1.0,
    1.0,
    1.0,
]
auto_adjust_pen = true
persist = true
pinned = false

[[boards.items]]
id = "blueprint"
name = "Blueprint"
background = [
    0.063,
    0.125,
    0.251,
]
default_pen_color = [
    0.902,
    0.945,
    1.0,
]
auto_adjust_pen = true
persist = true
pinned = false

[[boards.items]]
id = "corkboard"
name = "Corkboard"
background = [
    0.42,
    0.294,
    0.165,
]
default_pen_color = [
    0.969,
    0.89,
    0.784,
]
auto_adjust_pen = true
persist = true
pinned = false

[board]
enabled = true
default_mode = "transparent"
whiteboard_color = [
    0.992,
    0.992,
    0.992,
]
blackboard_color = [
    0.067,
    0.067,
    0.067,
]
whiteboard_pen_color = [
    0.0,
    0.0,
    0.0,
]
blackboard_pen_color = [
    1.0,
    1.0,
    1.0,
]
auto_adjust_pen = true

