#################
### AUTOSTART ###
#################

# Environment
env = QT_QPA_PLATFORMTHEME,qt6ct
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1

# Desktop portal / polkit
# exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
# exec-once = /usr/lib/xdg-desktop-portal-hyprland
exec-once = systemctl --user start hyprpolkitagent # use only without uwsm
exec-once = ~/.local/bin/nuclear_portal_hyprland

# Theme and GTK settings
exec = gsettings set org.gnome.desktop.interface color-scheme "prefer-dark"   # GTK4 apps
exec = gsettings set org.gnome.desktop.interface gtk-theme 'Materia-dark-compact'   # for GTK3 apps
exec = gsettings set org.gnome.desktop.interface icon-theme 'Papirus-Dark'   # icons

# Power / idle management
exec-once = hypridle # use only without uwsm
# exec-once = wlsunset -S 07:30 -s 18:30 -t 4000 -T 6000 -d 1800 # auto night mode

# Wallpaper and bars
exec-once = waypaper --restore
exec-once = waybar
exec-once = swaync

# Utilities
exec-once = udiskie
exec-once = wayscriber --daemon
exec-once = qalc -e
exec-once = ~/.local/bin/discrakt

# clipboard helpers
# exec-once = wl-paste --type text --watch cliphist store # Stores only text data
# exec-once = wl-paste --type image --watch cliphist store # Stores only image data
exec-once = copyq --start-server
