#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 4
    gaps_out = 8

    border_size = 2
    col.active_border = rgba(13,12,12,0.67)
    col.inactive_border = rgba(24,22,22,0.67)
    resize_on_border = true

    allow_tearing = false

    layout = master
}

decoration {
    rounding = 2
    rounding_power = 2

    # no transparency
    active_opacity = 1
    inactive_opacity = 1

    # yes transparency
    # active_opacity = 0.85
    # inactive_opacity = 0.84

    shadow {
        enabled = false
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 11
        passes = 2
        vibrancy = 0.1696
    }
}
