###################
### KEYBINDINGS ###
###################

$mainMod = SUPER # Windows key as main modifier

# Launch
bind = $mainMod, return, exec, $terminal
bind = $mainMod, space, exec, $menu
bind = $mainMod, P, exec, $power
bind = $mainMod, V, exec, copyq toggle
bind = $mainMod, period, exec, bemoji --noline --hist-limit 10 --echo --type wofi | wl-copy
bind = $mainMod, C, exec, wofi-calc
bind = $mainMod, D, exec, kitty -e zsh -i -c "y; zsh -i"
bind = $mainMod SHIFT, D, exec, waypaper

# Important
bind = $mainMod, Q, killactive,
bind = $mainMod SHIFT CONTROL, Q, exit,
bind = $mainMod, B, exec, killall waybar || waybar
bind = $mainMod, A, exec, $HOME/.local/bin/scripts/change-theme.sh --wofi --yes --quiet
bind = $mainMod ALT, Z, exec, ~/.config/hypr/toggle-dnd.sh
bind = $mainMod CTRL SHIFT, N, exec, swaync-client --hide-latest
# bind = $mainMod ALT, Tab, overview:toggle

# Layouts
bind = $mainMod SHIFT, space, togglefloating,
bind = $mainMod ALT, space, exec, hyprctl dispatch workspaceopt allfloat
bind = $mainMod, O, pseudo, # dwindle
bind = $mainMod, I, togglefloating, # dwindle
bind = $mainMod, F, fullscreen,

# Move focus with mainMod + vim keys
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Resize windows with mainMod + vim keys
bind = $mainMod SHIFT, H, resizeactive, -10 0
bind = $mainMod SHIFT, L, resizeactive, 10 0
bind = $mainMod SHIFT, K, resizeactive, 0 -10
bind = $mainMod SHIFT, J, resizeactive, 0 10

# Resize windows with mainMod + arrow keys
bind = $mainMod SHIFT, left, resizeactive, -10 0
bind = $mainMod SHIFT, right, resizeactive, 10 0
bind = $mainMod SHIFT, up, resizeactive, 0 -10
bind = $mainMod SHIFT, down, resizeactive, 0 10

# Move windows with mainMod + vim keys
bind = $mainMod CTRL, H, movewindow, l
bind = $mainMod CTRL, L, movewindow, r
bind = $mainMod CTRL, K, movewindow, u
bind = $mainMod CTRL, J, movewindow, d

# Move windows with mainMod + arrow keys
bind = $mainMod CTRL, left, movewindow, l
bind = $mainMod CTRL, right, movewindow, r
bind = $mainMod CTRL, up, movewindow, u
bind = $mainMod CTRL, down, movewindow, d

# Alt-Tabbing (works in workspaces only)
bind = ALT, Tab, cyclenext
# bind = ALT SHIFT, Tab, cycleprev # doesnt work rn (maybe a bug?)

# Alt-tab but for workspaces 
bind = $mainMod, Tab, workspace, previous

# Disable Anims
bind = WIN, F1, exec, ~/.config/hypr/powersave.sh

# Help Menu
bind = $mainMod SHIFT, F1, exec, kitty --title "Hyprland Help" ~/.local/bin/hyprland-keybind-help

# Scrcpy script terminal
bind = $mainMod, F2, exec, ~/.local/bin/scripts/scrcpy_phone

# cursor zoom
bind = SUPER SHIFT, Z, exec, hyprctl keyword cursor:zoom_factor 3
bindr = SUPER SHIFT, Z, exec, hyprctl keyword cursor:zoom_factor 1

# wayscriber
bind = SUPER, mouse:276, exec, wayscriber --daemon-toggle
bind = SUPER SHIFT, mouse:276, exec, wayscriber --daemon-toggle --freeze
bind = SUPER ALT, mouse:276, exec, wayscriber --light-draw-toggle

# minimize something
bind = $mainMod, X, togglespecialworkspace, magic
bind = $mainMod, X, movetoworkspace, +0
bind = $mainMod, X, togglespecialworkspace, magic
bind = $mainMod, X, movetoworkspace, special:magic
bind = $mainMod, X, togglespecialworkspace, magicA

# Active window opacity
bind = SUPER, \, exec, ~/.local/bin/scripts/hypr-opacity toggle
bind = SUPER SHIFT, -, exec, ~/.local/bin/scripts/hypr-opacity down
bind = SUPER CTRL, 0, exec, ~/.local/bin/scripts/hypr-opacity reset
bind = SUPER ALT, =, exec, ~/.local/bin/scripts/hypr-opacity up

# Toggle opacity
bind = SUPER, Home, setprop, active opaque toggle # active window transparency
bind = SUPER SHIFT, Home, exec, ~/.local/bin/scripts/toggle-global-opacity # global transparency toggle (all windows)

# Screenshotting

# capture active monitor
bind = $mainMod, INSERT, exec, hyprshot --mode active --mode output --freeze --notif-timeout 3000 --output-folder "$HOME/Pictures/Screenshots/$(date '+%B' | tr '[:upper:]' '[:lower:]') - $(date '+%Y')"

# capture active window
bind = $mainMod CTRL, INSERT, exec, hyprshot --mode active --mode window --freeze --notif-timeout 3000 --output-folder "$HOME/Pictures/Screenshots/$(date '+%B' | tr '[:upper:]' '[:lower:]') - $(date '+%Y')"

# capture region
bind = $mainMod SHIFT, INSERT, exec, hyprshot --mode region --freeze --notif-timeout 3000 --output-folder "$HOME/Pictures/Screenshots/$(date '+%B' | tr '[:upper:]' '[:lower:]') - $(date '+%Y')"

# with annotation
bind = $mainMod SHIFT CTRL, INSERT, exec, mkdir -p "$HOME/Pictures/Screenshots/$(date '+%B' | tr '[:upper:]' '[:lower:]') - $(date '+%Y')" && grim -g "$(slurp -o -r -c '##ff0000ff')" -t ppm - | satty --floating-hack --filename - --output-filename "$HOME/Pictures/Screenshots/$(date '+%B' | tr '[:upper:]' '[:lower:]') - $(date '+%Y')/screenshot-$(date '+%Y-%m-%d-%H-%M-%S').png"


# hyprpicker
bind = $mainMod SHIFT, P, exec, hyprpicker -a

# turn night filter on or off
bind = $mainMod CTRL, N, exec, killall wlsunset  && notify-send "Night Filter" "Night filter has been turned off." || wlsunset -S 07:30 -s 18:30 -t 4000 -T 6000 -d 1800 

# Special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
