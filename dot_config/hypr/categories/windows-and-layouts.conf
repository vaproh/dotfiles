###############
### LAYOUTS ###
###############

dwindle {
	preserve_split = true 
}

master {
	new_status = slave
	orientation = left
	mfact = 0.55
}

##############################
### WINDOWS AND WORKSPACES ###
##############################

# All Rounders
windowrule = no_focus on, match:class ^$
windowrule = float on, match:class ^(floating)$

# App specifics

# Hyprland Help Menu
windowrule = float on, match:title ^Hyprland Help$
windowrule = center on, match:title ^Hyprland Help$
windowrule = size 770 690, match:title ^Hyprland Help$

# PulseAudio Control - Floating and Centered
windowrule = float on, match:class ^(pavucontrol-qt)$
windowrule = center on, match:class ^(pavucontrol-qt)$
windowrule = size 800 600, match:class ^(pavucontrol-qt)$

# imv
windowrule = float on, match:class ^(imv)$
windowrule = center on, match:class ^(imv)$
windowrule = size 1280 720, match:class ^(imv)$

# mpv
windowrule = float on, match:class ^(mpv)$
windowrule = center on, match:class ^(mpv)$
windowrule = size 1280 720, match:class ^(mpv)$

# Satty
windowrule = float on, match:class ^(com.gabm.satty)$
windowrule = center on, match:class ^(com.gabm.satty)$
windowrule = size 1376 860, match:class ^(com.gabm.satty)$

# Hypr share picker
windowrule = float on, match:class ^(hyprland-share-picker)$
windowrule = center on, match:class ^(hyprland-share-picker)$
windowrule = size 600 400, match:class ^(hyprland-share-picker)$

# Scrcpy + script terminal
windowrule = float on, match:class ^(scrcpy)$
windowrule = center on, match:class ^(scrcpy)$

# camofox
windowrule = workspace 1, no_initial_focus match:class ^(camoufox-default)$

# Stremio
windowrule = workspace 6, match:class ^(com.stremio.stremio)$

# Browsers to Workspace 3
windowrule = workspace 3, match:class ^(firefox)$
windowrule = workspace 3, match:class ^(waterfox)$
windowrule = workspace 3, match:class ^(librewolf)$
windowrule = workspace 3, match:class ^(brave)$
windowrule = workspace 3, match:class ^(thorium)$
windowrule = workspace 3, match:class ^(chromium)$
windowrule = workspace 3, match:class ^(chrome)$
windowrule = workspace 3, match:class ^(zen)$
windowrule = workspace 3, match:class ^(brave-origin)$

# Motrix
windowrule = workspace 3, match:class ^(Motrix)$
windowrule = float on, match:class ^(Motrix)$
windowrule = center on, match:class ^(Motrix)$
windowrule = size 1280 720, match:class ^(Motrix)$

# copyq
windowrule = float on, match:class ^(com.github.hluk.copyq)$
windowrule = center on, match:class ^(com.github.hluk.copyq)$
windowrule = size 550 700, match:class ^(com.github.hluk.copyq)$

# Feh
windowrule = float on, match:class ^(feh)$
windowrule = center on, match:class ^(feh)$
windowrule = size 1280 720, match:class ^(feh)$

# waypaper
windowrule = float on, match:class ^(waypaper)$
windowrule = center on, match:class ^(waypaper)$
windowrule = size 1280 720, match:class ^(waypaper)$

# utils
windowrule = workspace 5, match:class ^(com.obsproject.Studio)$
windowrule = workspace 4, match:class ^(code-oss)$
windowrule = workspace 4, match:class ^(antigravity-ide)$
windowrule = workspace 4, match:class ^(Virt-manager)$
windowrule = workspace 6, match:class ^(vlc)$
windowrule = workspace 4, match:class ^(com-azefsw-audioconnect-desktop-app-MainKt)$
windowrule = workspace 2, match:class ^(Godot)$
windowrule = workspace 4, match:class ^(blender)$
windowrule = workspace 6, match:class ^(Jellyfin Media Player)$
windowrule = workspace 4, match:class ^(Exodus)$
windowrule = workspace 5, match:class ^(org.qbittorrent.qBittorrent)$
windowrule = workspace 7, match:class ^(Spotify)$
windowrule = workspace 9, match:class ^(steam)$
windowrule = workspace 5, match:class ^(com.github.PintaProject.Pinta)$
windowrule = workspace 5, match:class ^(obsidian)$

# chat
windowrule = workspace 8, match:class ^(org.telegram.desktop)$
windowrule = workspace 8, match:class ^(vesktop)$
windowrule = workspace 8, match:class ^(discord)$
windowrule = workspace 8, match:class ^(com.ktechpit.whatsie)$

# game dev
# match the gamescope-wrapped game
windowrule = float on, center on, match:class ^(gamescope)$
# or match by title prefix
windowrule = workspace 2, match:title ^(godot_game).*$

# xwaylandvideobridge
windowrule {
    name = xwayland-video-bridge-fixes
    match:class = xwaylandvideobridge

    no_initial_focus = true
    no_focus = true
    no_anim = true
    no_blur = true
    max_size = 1 1
    opacity = 0.0
}

# wofi
windowrule = no_focus on, match:class ^(wofi)$
windowrule = no_shadow on, match:class ^(wofi)$
