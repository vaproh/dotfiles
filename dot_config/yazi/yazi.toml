[mgr]
ratio = [1, 4, 3]
sort_by = "natural"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
sort_translit = false
linemode = "size_and_mtime"
show_hidden = false
show_symlink = true
scrolloff = 5
mouse_events = ["click", "scroll"]
title_format = "Yazi: {cwd}"

[preview]
wrap = "no"
tab_size = 2
max_width = 600
max_height = 900

[opener]
edit = [
    { run = '${EDITOR:-nvim} "$@"', desc = "$EDITOR", block = true, for = "unix" },
]
open = [{ run = 'xdg-open "$1"', desc = "Open", for = "linux" }]
reveal = [
    { run = 'xdg-open "$(dirname "$1")"', desc = "Reveal", for = "linux" },
]
play = [
    { run = 'mpv --force-window "$@"', orphan = true, for = "linux" },
]
image = [
    { run = 'imv "$@"', orphan = true, for = "linux" },
]
audio = [
    { run = 'mpg123 "$@"', block = true, desc = "Play Audio", for = "linux" },
]
pdf = [
    { run = 'zathura "$@"', orphan = true, desc = "PDF", for = "linux" },
]

[open]
rules = [
    { url = "*/", use = ["edit", "open", "reveal"] },
    { mime = "text/*", use = ["edit", "reveal"] },
    { mime = "image/*", use = ["image", "reveal"] },
    { mime = "video/*", use = ["play", "reveal"] },
    { mime = "audio/*", use = ["audio", "reveal"] },
    { mime = "application/pdf", use = ["pdf", "reveal"] },
    { url = "*", use = ["open", "reveal"] },
]

[tasks]
micro_workers = 10
macro_workers = 10
bizarre_retry = 3

[input]
cursor_blink = true

[confirm]
trash_title = "Trash {n} selected file{s}?"
delete_title = "Permanently delete {n} selected file{s}?"
