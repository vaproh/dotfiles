# ==============================================================================
# Keybindings
# ==============================================================================

# Prefix keybindings
set -g prefix C-b
set -g prefix2 C-Space

bind C-b send-prefix
bind C-Space send-prefix

# Reload configuration
unbind r
bind r source-file ~/.tmux.conf \; display-message "Reloaded ~/.tmux.conf"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# New panes inherit the current working directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# New windows inherit the current working directory
bind c new-window -c "#{pane_current_path}"

# ==============================================================================
# General Settings
# ==============================================================================

# Enable mouse support
set -g mouse on

# Use system clipboard
set -g set-clipboard on

# Place the status bar at the top
set -g status-position top

# Start numbering windows and panes at 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Increase scrollback history
set -g history-limit 100000

# Faster escape sequences
set -sg escape-time 10

# ==============================================================================
# Status Bar
# ==============================================================================

set -g status-right '%Y-%m-%d %I:%M %p'

# ==============================================================================
# Plugins
# ==============================================================================

# TPM
set -g @plugin 'tmux-plugins/tpm'

# Sensible defaults
set -g @plugin 'tmux-plugins/tmux-sensible'

# Theme
set -g @plugin 'uhs-robert/tmux-oasis'

# Session persistence
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Fuzzy finder
set -g @plugin 'sainnhe/tmux-fzf'

# Floating terminal
set -g @plugin 'omerxx/tmux-floax'

# Smart text extraction
set -g @plugin 'laktak/extrakto'

# Jump directly to visible text
set -g @plugin 'fcsonline/tmux-thumbs'

# Show available keybindings
set -g @plugin 'alexwforsythe/tmux-which-key'

# ==============================================================================
# Plugin Configuration
# ==============================================================================

# Oasis
set -g @oasis_flavor 'moonlight_dark'
set -g @oasis_clock_24h 'off'

# Continuum
set -g @continuum-save-interval '5'
set -g @continuum-restore 'off'

# Floax
set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color 'cyan'

# Extrakto
set -g @extrakto_clip_tool 'tmux'

# Which-Key
set -g @which-key-timeout 1500
set -g @which-key-show-remaining on

# Plugin shortcuts
bind -N "Open TMUX FZF" \
    f run-shell "~/.tmux/plugins/tmux-fzf/scripts/session.sh"

bind -N "Open floating terminal" \
    o run-shell "~/.tmux/plugins/tmux-floax/popup.sh"

bind -N "Jump to visible text" \
    t run-shell "~/.tmux/plugins/tmux-thumbs/tmux-thumbs.sh"

bind -N "Extract and search terminal text" \
    e run-shell "~/.tmux/plugins/extrakto/extrakto.sh"

# ==============================================================================
# TPM Initialization (Keep this last)
# ==============================================================================

run '~/.tmux/plugins/tpm/tpm'

